<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body {
      background: #fff3cd;
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    h2 {
      color: #856404;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    button {
      background: #ffc107;
      color: #212529;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #e0a800;
    }
  </style>
</head>
<body>
  <h2>👮 Admin Login</h2>
  <form action="/admin-login" method="POST">
    <input type="text" name="username" placeholder="Admin Username" required><br>
    <input type="password" name="password" placeholder="Admin Password" required><br>
    <button type="submit">Login</button>
  </form>
</body>
</html>
